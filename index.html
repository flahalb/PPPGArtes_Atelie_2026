<html>

<head>

<meta charset="utf-8">

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

</head>

<body>

<a-scene

mindar-image="imageTargetSrc: targets.mind;"

embedded

color-space="sRGB"

renderer="colorManagement: true; physicallyCorrectLights"

vr-mode-ui="enabled: false"

device-orientation-permission-ui="enabled: false">

<a-assets>

<video

id="video"

src="lamparina3d.mp4"

loop

muted

playsinline>

</video>

</a-assets>

<a-camera position="0 0 0"

look-controls="enabled">

</a-camera>

<a-entity mindar-image-target="targetIndex: 0">

<a-video

src="#video"

width="1.12"

height="2"

position="0 1 0">

</a-video>

</a-entity>

</a-scene>

<script> const target=document.querySelector('[mindar-image-target]'); const video=document.querySelector('#video'); target.addEventListener("targetFound",()=>{ video.play(); }); target.addEventListener("targetLost",()=>{ video.pause(); }); </script>

</body>

</html>
