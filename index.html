<html>
<head>
<meta charset="utf-8">
<title>Lamparina Labirinto</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

</head>

<body style="margin:0; overflow:hidden;">

<a-scene
 embedded
 vr-mode-ui="enabled: false"
 renderer="antialias: true"
 arjs="trackingMethod: best; sourceType: webcam;">

```
<a-assets>
    <a-asset-item
        id="lamparina"
        src="lamparina.glb">
    </a-asset-item>
</a-assets>

<!-- Marcador Hiro -->

<a-marker preset="hiro">

    <!-- Modelo 3D -->

    <a-entity
        gltf-model="#lamparina"
        position="0 0.3 0"
        rotation="0 0 0"
        scale="0.2 0.2 0.2"

        animation="
        property: rotation;
        from: 0 0 0;
        to: 0 360 0;
        loop: true;
        dur: 25000;
        easing: linear;">
    </a-entity>

    <!-- Luz interna da luminária -->

    <a-light
        type="point"
        color="#FFD58A"
        intensity="3"
        distance="5"
        position="0 0.4 0"

        animation="
        property: intensity;
        from: 2;
        to: 4;
        dir: alternate;
        loop: true;
        dur: 3000;">
    </a-light>

    <!-- Luz ambiente -->

    <a-light
        type="ambient"
        intensity="1">
    </a-light>

</a-marker>

<a-entity camera></a-entity>
```

</a-scene>

</body>
</html>
