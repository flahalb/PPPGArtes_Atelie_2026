<html>
 <html>
 <head>
  <title>Primeira experiência de RA usando Hiro e A-frame</title>
   <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
   <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

 </head>
  <body style="margin: 0 px; overflow: hidden">
    <a-scene vr-mode-ui="enabled: false" embedded arjs="debugUIEnabled: false">
      <a-marker present="hiro">
       <a-box position="0 0.5 0" material="color:#ff6b8e;"></a-box> 
       <a-cone position="0 1 0" color="#ff6b82" radius-bottom="2" radius-top="0.5"></a-cone>
       <a-sphere position="0 1.5 0" color="#6bffdc" radius="5"></a-sphere>
      </a-marker>
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
